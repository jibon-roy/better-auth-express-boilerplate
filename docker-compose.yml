services:
  uh-db:
    image: postgres:16-alpine
    container_name: uh-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: uh_health
    volumes:
      - uh-pg-data:/var/lib/postgresql/data
    networks:
      - uh-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d uh_health']
      interval: 10s
      timeout: 5s
      retries: 10

  uh-server:
    image: ${REGISTRY}/${IMAGE_NAMESPACE}/uh-healthcare-server:${IMAGE_TAG}
    container_name: uh-server
    restart: unless-stopped
    env_file:
      - ./server/.env.production
    depends_on:
      uh-db:
        condition: service_healthy
    networks:
      - uh-net
    ports:
      - '127.0.0.1:8000:8000'

  uh-client:
    image: ${REGISTRY}/${IMAGE_NAMESPACE}/uh-healthcare-client:${IMAGE_TAG}
    container_name: uh-client
    restart: unless-stopped
    environment:
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
    depends_on:
      - uh-server
    networks:
      - uh-net
    ports:
      - '127.0.0.1:3000:3000'

networks:
  uh-net:
    driver: bridge

volumes:
  uh-pg-data:
